{% extends "base.html" %}
{% block content %}
<div class="auth-wrap">
  <div class="auth">
    <div class="brand" style="margin-bottom:10px;"><div class="logo"></div><div>Manoj Premium Fashion</div></div>
    <h2>Login 🔐</h2>
    <div class="muted">Welcome back.</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" style="margin-top:14px;">
      <input class="input" name="username" placeholder="Username" required>
      <input class="input" type="password" name="password" placeholder="Password" required>
      <button class="btn btn-primary" style="width:100%;margin-top:10px;">Login</button>
    </form>
    <div style="margin-top:12px;">
      <a href="/register">Create account</a>
    </div>
    <div class="muted" style="margin-top:14px;">
      Admin default: <b>admin</b> / <b>admin123</b>
    </div>
  </div>
</div>
{% endblock %}
